name: torch
channels:
    - conda-forge
dependencies:
    - python=3.11
    - root=6.38.02
    - jupyter
    - pandas
    - pytables
    - numba
    - scipy
    - matplotlib
    - seaborn
    - pydot    
    - scikit-learn
    - xgboost
    - shap
    - uproot
    - mplhep
    - h5py
    - wandb
    - pip
    - pip:
        # https://pytorch.org/get-started/previous-versions/
        - --index-url https://download.pytorch.org/whl/cu124
        - torch==2.6.0
        - torchvision==0.21.0
        - torchaudio==2.6.0
        - --extra-index-url https://pypi.org/simple
        - lightning==2.4.*
        - FrEIA
